# XcodeGen spec — generates OfflineSyncDemo.xcodeproj from this file.
# Regenerate with:  xcodegen generate
name: OfflineSyncDemo
options:
  bundleIdPrefix: ai.trainvision.demo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  OfflineSyncDemo:
    type: application
    platform: iOS
    sources:
      - path: OfflineSyncDemo
      # The generated Swift API (the C header/modulemap ship inside the xcframework).
      - path: Generated/client_sdk.swift
    dependencies:
      # The shared Rust core (device + HTTP client) as a static xcframework.
      - framework: ClientSdk.xcframework
        embed: false
    info:
      path: OfflineSyncDemo/Info.plist
      properties:
        UILaunchScreen: {}
        # The app syncs to the backend over plain http://localhost — allow it.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.trainvision.demo.offlinesync
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        # ClientSdk.xcframework ships arm64 device + arm64 simulator (Apple Silicon).
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
